{% extends 'base.html' %}

{% block body %}
<div class="container mt-4">
    <div class="row">
        <div class="col-md-4">
            <div class="card shadow-sm mb-4">
                <div class="card-header bg-primary text-white">
                    <h5 class="mb-0">Add Employee</h5>
                </div>
                <div class="card-body">
                    <form action="/" method="post">
                        <div class="mb-3">
                            <label class="form-label fw-bold">Full Name</label>
                            <input type="text" class="form-control" name="name" placeholder="John Doe" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-bold">Email</label>
                            <input type="email" class="form-control" name="email" placeholder="email@example.com" required>
                        </div>
                        <button type="submit" class="btn btn-primary w-100">Submit Data</button>
                    </form>
                </div>
            </div>
        </div>

        <div class="col-md-8">
            <div class="card shadow-sm">
                <div class="card-header bg-white">
                    <h5 class="mb-0">Employee Directory</h5>
                </div>
                <div class="card-body p-0">
                    <table class="table table-hover mb-0">
                        <thead class="table-light">
                            <tr>
                                <th scope="col" class="ps-3">SNo</th>
                                <th scope="col">Name</th>
                                <th scope="col">Email</th>
                                <th scope="col" class="text-center">Actions</th>
                            </tr>
                        </thead>
                        <tbody>
                            {% for i in allemployee %}
                            <tr>
                                <th scope="row" class="ps-3">{{loop.index}}</th>
                                <td><strong>{{i.name}}</strong></td>
                                <td>{{i.email}}</td>
                                <td class="text-center">
                                    <a href="/update/{{i.sno}}" class="btn btn-outline-dark btn-sm">Update</a>
                                    <a href="/delete/{{i.sno}}" class="btn btn-outline-danger btn-sm" onclick="return confirm('Delete this record?')">Delete</a>
                                </td>
                            </tr>
                            {% endfor %}
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock body %}
