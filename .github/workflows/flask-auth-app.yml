name: FlaskAuthApp CI/CD

on:
  push:
    branches: [ main ]
    # This ensures the pipeline ONLY runs if you change files in the FlaskAuthApp folder
    paths:
      - 'FlaskAuthApp/**'

jobs:
  test:
    runs-on: ubuntu-latest
    # Set the working directory so pip and python commands run inside the correct folder
    defaults:
      run:
        working-directory: ./FlaskAuthApp
        
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          
      - name: Run a basic syntax check
        run: python -m py_compile app.py

  deploy:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Render Deployment
        # Using a NEW secret specific to this app
        run: |
          curl -X POST "${{ secrets.FLASK_AUTH_RENDER_HOOK }}"