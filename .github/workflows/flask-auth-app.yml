name: FlaskAuthApp CI/CD

on:
  push:
    branches: [ main ]
    paths:
      - 'FlaskAuthApp/**' # Runs only when FlaskAuthApp folder changes

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./FlaskAuthApp # Executes commands inside the project folder
        
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          
      - name: Run a basic syntax check
        run: python -m py_compile app.py

  deploy:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Render Deployment
        run: |
          curl -X POST "${{ secrets.FLASK_AUTH_RENDER_HOOK }}"